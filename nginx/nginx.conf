server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml;
    gzip_min_length 1024;

    # Cache static assets aggressively (content-hashed by Vite)
    location ~* \.(js|css|png|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA catch-all: serve index.html for all unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for load balancers / monitoring
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
